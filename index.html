<!DOCTYPE html>
<html lang="english">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consent Widget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="widget-container">
    <div class="header-container">
      <div class="logo" id="logo-area"></div>
      <div id="language-wrapper" style="display: none;">
        <label for="langSelect">Language:</label>
        <select id="langSelect"></select>
      </div>
    </div>
    <div id="consent-root">Loading consent form...</div>
    <div id="error-message" class="error-message"></div>
    <div id="toast"></div>
    <div class="button-group" id="button-group">
      <button class="cancel" id="cancelBtn" style="display: none;">Cancel</button>
      <button class="submit" id="submitBtn" style="display: none;">Submit</button>
    </div>
  </div>
  <script>
    // Configuration options for the consent widget
    window.consentWidgetConfig = {
      consentFormId: "ab4af016-db50-4095-af5f-a0136dcd640e",
      apiUrl: "https://qa-hs.qhtpl.com/cpm-api/consent/v1/getConsentFormById",
      submitApiUrl: "https://qa-hs.qhtpl.com/cpm-api/consent/v1/createOrUpdateConsent",
      showButtons: true,
      showLanguageDropdown: true,
      enableCheckboxes: true,
      enableRadioButtons: true,
      enableDropdowns: true
    };
  </script>
  <script src="script.js"></script>
</body>
</html>
